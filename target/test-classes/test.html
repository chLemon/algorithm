<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

</head>
<body>
<div style="overflow: auto;">
    <table id="table" style="border: 1px solid #D8D8D8;text-align: center;">

    </table>
</div>

<script>
    var arr =[[0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0000,0.0000,0.8306,0.0000,0.0000,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0000,0.0184,0.0000,0.0184,0.0000,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0181,0.0000,0.0192,0.0000,0.0181,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0177,0.0000,0.0015,0.0000,0.0015,0.0000,0.0177,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0008,0.0000,0.0181,0.0000,0.0008,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0000,0.0008,0.0000,0.0008,0.0000,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0000,0.0000,0.0177,0.0000,0.0000,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000],[0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000]]
    var nav = document.getElementById('table')
    for (var i = 0; i < arr.length; i++) {
        const tr = document.createElement('tr')
        tr.style.borderBottom = '1px solid #D8D8D8'
        tr.style.lineHeight = '32px'
        tr.style.height = '32px'
        for (var j = 0; j < arr[i].length; j++) {
            const td = document.createElement('td')
            const span = document.createElement('span')
            span.innerHTML = arr[i][j]
            span.style.display = 'inline-block'
            span.style.width = '100px'
            span.style.height = '100px'
            span.style.lineHeight = '100px'
            if (i !== arr.length - 1) {
                td.style.borderBottom = '1px solid #D8D8D8'
            }
            if (j !== arr[j].length - 1) {
                td.style.borderRight = '1px solid #D8D8D8'
            }
            td.appendChild(span)
            tr.appendChild(td)
        }
        nav.appendChild(tr)
    }
</script>

</body>
</html>
